name: VibeMatch
options:
  bundleIdPrefix: com.goodvibesclub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone and iPad
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  VibeMatch:
    type: application
    platform: iOS
    sources:
      - path: VibeMatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodvibesclub.vibematch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: VibeMatch
    info:
      path: VibeMatch/Info.plist
      properties:
        UIBackgroundModes: [audio]
        NSMicrophoneUsageDescription: "VibeMatch needs microphone access for voice chat"
