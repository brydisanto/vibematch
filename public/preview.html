    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VibeMatch Music Preview</title>
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: white; padding: 2rem; }
            h1 { color: #f472b6; text-align: center; }
            .track-list { max-width: 600px; margin: 0 auto; }
            .track { background: #16213e; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
            h3 { margin-top: 0; color: #4ade80; }
            audio { width: 100%; mt-2; outline: none; }
        </style>
    </head>
    <body>
        <h1>VibeMatch Audio Preview (Chill Mix)</h1>
        <div class="track-list">
    
            <div class="track">
                <h3>Feel The Beat</h3>
                <audio controls src="/music/feel-the-beat.mp3"></audio>
            </div>
        
            <div class="track">
                <h3>Chill Wave</h3>
                <audio controls src="/music/chill-wave.mp3"></audio>
            </div>
        
            <div class="track">
                <h3>Bossa Antigua</h3>
                <audio controls src="/music/bossa-antigua.mp3"></audio>
            </div>
        
            <div class="track">
                <h3>Samba Isobel</h3>
                <audio controls src="/music/samba-isobel.mp3"></audio>
            </div>
        
            <div class="track">
                <h3>Local Forecast (Slower)</h3>
                <audio controls src="/music/local-forecast-slower.mp3"></audio>
            </div>

            <div class="track">
                <h3>Kool Kats</h3>
                <audio controls src="/music/kool-kats.mp3"></audio>
            </div>
        
        </div>
    </body>
    </html>
