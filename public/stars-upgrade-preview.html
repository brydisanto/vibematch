<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Rating Upgrade Preview — VibeMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0114;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    color: #fff;
    min-height: 100vh;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #B366FF, #D8A0FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #7a5a9e;
    margin-bottom: 40px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* ===== CARD GRID ===== */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    .cards { grid-template-columns: 1fr; max-width: 420px; }
  }

  .card {
    background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
    border-radius: 28px;
    border: 1px solid rgba(179, 102, 255, 0.2);
    padding: 36px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(179,102,255,0.3), transparent 50%, rgba(179,102,255,0.15));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .option-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #9a6dd7;
    margin-bottom: 4px;
  }
  .option-name {
    font-size: 20px;
    margin-bottom: 28px;
    color: #D8A0FF;
  }

  .rank-label {
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #B366FF;
    margin-top: 20px;
    text-shadow: 0 0 12px rgba(179,102,255,0.5);
  }
  .score {
    font-size: 32px;
    letter-spacing: 2px;
    margin-top: 6px;
    background: linear-gradient(180deg, #fff 30%, #D8A0FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .replay-btn {
    margin-top: 24px;
    padding: 10px 32px;
    border: 1.5px solid rgba(179,102,255,0.5);
    border-radius: 40px;
    background: rgba(179,102,255,0.08);
    color: #D8A0FF;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .replay-btn:hover {
    background: rgba(179,102,255,0.2);
    border-color: #B366FF;
    box-shadow: 0 0 20px rgba(179,102,255,0.3);
    transform: scale(1.04);
  }
  .replay-btn:active { transform: scale(0.97); }

  /* ===== OPTION A: CELESTIAL ARC ===== */
  .stars-arc {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    height: 70px;
    position: relative;
  }
  .stars-arc .star-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stars-arc .star-wrap:nth-child(1) { --size: 32px; --offset: 8px; --delay: 0s; --float-dur: 3.2s; --enter-delay: 0s; }
  .stars-arc .star-wrap:nth-child(2) { --size: 40px; --offset: 3px; --delay: 0.4s; --float-dur: 3.6s; --enter-delay: 0.12s; }
  .stars-arc .star-wrap:nth-child(3) { --size: 52px; --offset: 0px; --delay: 0.8s; --float-dur: 4.0s; --enter-delay: 0.24s; }
  .stars-arc .star-wrap:nth-child(4) { --size: 40px; --offset: 3px; --delay: 1.2s; --float-dur: 3.5s; --enter-delay: 0.12s; }
  .stars-arc .star-wrap:nth-child(5) { --size: 32px; --offset: 8px; --delay: 1.6s; --float-dur: 3.3s; --enter-delay: 0s; }

  .stars-arc .star-wrap {
    width: var(--size);
    height: var(--size);
    margin-bottom: var(--offset);
    animation: arcEnter 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) var(--enter-delay) both,
               arcFloat var(--float-dur) ease-in-out calc(var(--delay) + 1s) infinite alternate;
  }
  .stars-arc .star-wrap svg { width: 100%; height: 100%; overflow: visible; }

  @keyframes arcEnter {
    0% { opacity: 0; transform: scale(0) translateY(30px); }
    60% { opacity: 1; transform: scale(1.15) translateY(-4px); }
    80% { transform: scale(0.95) translateY(2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes arcFloat {
    0% { transform: translateY(0); }
    100% { transform: translateY(-5px); }
  }

  /* Shine sweep clip for Option A */
  .star-a-shine {
    position: absolute;
    inset: 0;
    overflow: hidden;
    clip-path: url(#starClipA);
  }
  .star-a-shine::after {
    content: '';
    position: absolute;
    inset: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.5) 48%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.5) 52%, transparent 70%);
    animation: shineSweepA 3s ease-in-out var(--delay) infinite;
    transform: translateX(-150%);
  }
  @keyframes shineSweepA {
    0% { transform: translateX(-150%); }
    35% { transform: translateX(0%); }
    65% { transform: translateX(0%); }
    100% { transform: translateX(150%); }
  }

  /* ===== OPTION B: CONSTELLATION BURST ===== */
  .stars-constellation {
    position: relative;
    width: 320px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Light rays behind */
  .constellation-rays {
    position: absolute;
    width: 280px;
    height: 280px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: conic-gradient(
      from 0deg,
      transparent 0deg, rgba(179,102,255,0.08) 5deg, transparent 15deg,
      transparent 30deg, rgba(179,102,255,0.08) 35deg, transparent 45deg,
      transparent 60deg, rgba(179,102,255,0.08) 65deg, transparent 75deg,
      transparent 90deg, rgba(179,102,255,0.08) 95deg, transparent 105deg,
      transparent 120deg, rgba(179,102,255,0.08) 125deg, transparent 135deg,
      transparent 150deg, rgba(179,102,255,0.08) 155deg, transparent 165deg,
      transparent 180deg, rgba(179,102,255,0.08) 185deg, transparent 195deg,
      transparent 210deg, rgba(179,102,255,0.08) 215deg, transparent 225deg,
      transparent 240deg, rgba(179,102,255,0.08) 245deg, transparent 255deg,
      transparent 270deg, rgba(179,102,255,0.08) 275deg, transparent 285deg,
      transparent 300deg, rgba(179,102,255,0.08) 305deg, transparent 315deg,
      transparent 330deg, rgba(179,102,255,0.08) 335deg, transparent 345deg,
      transparent 360deg
    );
    border-radius: 50%;
    animation: rotateRays 20s linear infinite;
    pointer-events: none;
  }
  @keyframes rotateRays { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* Radial bloom */
  .constellation-bloom {
    position: absolute;
    width: 240px;
    height: 240px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(179,102,255,0.2) 0%, rgba(107,31,192,0.08) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .stars-row-b {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    position: relative;
    z-index: 2;
  }
  .stars-row-b .star-wrap-b {
    position: relative;
    width: 44px;
    height: 44px;
    --ignite-delay: calc(var(--idx) * 0.2s);
  }
  .stars-row-b .star-wrap-b:nth-child(1) { --idx: 0; }
  .stars-row-b .star-wrap-b:nth-child(2) { --idx: 1; }
  .stars-row-b .star-wrap-b:nth-child(3) { --idx: 2; }
  .stars-row-b .star-wrap-b:nth-child(4) { --idx: 3; }
  .stars-row-b .star-wrap-b:nth-child(5) { --idx: 4; }

  .stars-row-b .star-wrap-b svg {
    width: 44px;
    height: 44px;
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.9))
            drop-shadow(0 0 6px rgba(179,102,255,0.8))
            drop-shadow(0 0 16px rgba(179,102,255,0.5))
            drop-shadow(0 0 30px rgba(179,102,255,0.25));
    animation: ignite 0.6s ease-out var(--ignite-delay) both,
               breatheB 2.4s ease-in-out calc(1.2s + var(--idx) * 0.3s) infinite alternate;
  }
  @keyframes ignite {
    0% { opacity: 0.15; filter: brightness(0.2) drop-shadow(0 0 0 transparent); transform: scale(0.8); }
    50% { opacity: 1; filter: brightness(2) drop-shadow(0 0 4px #fff) drop-shadow(0 0 12px #B366FF); transform: scale(1.15); }
    100% { opacity: 1; filter: brightness(1) drop-shadow(0 0 2px rgba(255,255,255,0.9)) drop-shadow(0 0 6px rgba(179,102,255,0.8)) drop-shadow(0 0 16px rgba(179,102,255,0.5)) drop-shadow(0 0 30px rgba(179,102,255,0.25)); transform: scale(1); }
  }
  @keyframes breatheB {
    0% { filter: brightness(1) drop-shadow(0 0 2px rgba(255,255,255,0.9)) drop-shadow(0 0 6px rgba(179,102,255,0.8)) drop-shadow(0 0 16px rgba(179,102,255,0.5)) drop-shadow(0 0 30px rgba(179,102,255,0.25)); }
    100% { filter: brightness(1.2) drop-shadow(0 0 3px rgba(255,255,255,1)) drop-shadow(0 0 8px rgba(179,102,255,1)) drop-shadow(0 0 20px rgba(179,102,255,0.6)) drop-shadow(0 0 36px rgba(179,102,255,0.35)); }
  }

  /* Particles for option B */
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #D8A0FF;
    pointer-events: none;
    top: 50%;
    left: 50%;
    opacity: 0.7;
  }
  .particle:nth-child(2) { width: 2px; height: 2px; background: #fff; opacity: 0.5; }
  .particle:nth-child(3) { width: 2.5px; height: 2.5px; background: #B366FF; opacity: 0.6; }
  .particle:nth-child(4) { width: 2px; height: 2px; background: #D8A0FF; opacity: 0.55; }
  .particle:nth-child(5) { width: 1.5px; height: 1.5px; background: #fff; opacity: 0.45; }

  .star-wrap-b:nth-child(1) .particle:nth-child(2) { animation: orbit 2.8s linear 0.3s infinite; --orbit-r: 28px; }
  .star-wrap-b:nth-child(1) .particle:nth-child(3) { animation: orbit 3.4s linear 0.6s infinite; --orbit-r: 22px; }
  .star-wrap-b:nth-child(1) .particle:nth-child(4) { animation: orbit 2.2s linear 1.0s infinite reverse; --orbit-r: 32px; }
  .star-wrap-b:nth-child(1) .particle:nth-child(5) { animation: orbit 3.8s linear 0.1s infinite; --orbit-r: 18px; }
  .star-wrap-b:nth-child(1) .particle:nth-child(6) { animation: orbit 3.0s linear 1.4s infinite reverse; --orbit-r: 25px; width: 2px; height: 2px; background: #B366FF; opacity: 0.5; }

  .star-wrap-b:nth-child(2) .particle:nth-child(2) { animation: orbit 3.0s linear 0.5s infinite; --orbit-r: 26px; }
  .star-wrap-b:nth-child(2) .particle:nth-child(3) { animation: orbit 2.6s linear 1.2s infinite reverse; --orbit-r: 30px; }
  .star-wrap-b:nth-child(2) .particle:nth-child(4) { animation: orbit 3.6s linear 0.0s infinite; --orbit-r: 20px; }
  .star-wrap-b:nth-child(2) .particle:nth-child(5) { animation: orbit 2.4s linear 0.8s infinite reverse; --orbit-r: 34px; }
  .star-wrap-b:nth-child(2) .particle:nth-child(6) { animation: orbit 3.2s linear 1.6s infinite; --orbit-r: 24px; width: 2px; height: 2px; background: #fff; opacity: 0.4; }

  .star-wrap-b:nth-child(3) .particle:nth-child(2) { animation: orbit 3.2s linear 0.2s infinite reverse; --orbit-r: 24px; }
  .star-wrap-b:nth-child(3) .particle:nth-child(3) { animation: orbit 2.4s linear 0.9s infinite; --orbit-r: 32px; }
  .star-wrap-b:nth-child(3) .particle:nth-child(4) { animation: orbit 3.8s linear 1.5s infinite reverse; --orbit-r: 20px; }
  .star-wrap-b:nth-child(3) .particle:nth-child(5) { animation: orbit 2.8s linear 0.4s infinite; --orbit-r: 28px; }
  .star-wrap-b:nth-child(3) .particle:nth-child(6) { animation: orbit 3.5s linear 1.0s infinite; --orbit-r: 22px; width: 2.5px; height: 2.5px; background: #D8A0FF; opacity: 0.6; }

  .star-wrap-b:nth-child(4) .particle:nth-child(2) { animation: orbit 2.6s linear 1.1s infinite; --orbit-r: 30px; }
  .star-wrap-b:nth-child(4) .particle:nth-child(3) { animation: orbit 3.4s linear 0.3s infinite reverse; --orbit-r: 22px; }
  .star-wrap-b:nth-child(4) .particle:nth-child(4) { animation: orbit 2.0s linear 0.7s infinite; --orbit-r: 26px; }
  .star-wrap-b:nth-child(4) .particle:nth-child(5) { animation: orbit 3.0s linear 1.3s infinite reverse; --orbit-r: 34px; }
  .star-wrap-b:nth-child(4) .particle:nth-child(6) { animation: orbit 2.8s linear 0.5s infinite; --orbit-r: 19px; width: 2px; height: 2px; background: #B366FF; opacity: 0.55; }

  .star-wrap-b:nth-child(5) .particle:nth-child(2) { animation: orbit 3.6s linear 0.8s infinite reverse; --orbit-r: 28px; }
  .star-wrap-b:nth-child(5) .particle:nth-child(3) { animation: orbit 2.2s linear 0.1s infinite; --orbit-r: 24px; }
  .star-wrap-b:nth-child(5) .particle:nth-child(4) { animation: orbit 3.0s linear 1.0s infinite reverse; --orbit-r: 32px; }
  .star-wrap-b:nth-child(5) .particle:nth-child(5) { animation: orbit 2.8s linear 0.6s infinite; --orbit-r: 20px; }
  .star-wrap-b:nth-child(5) .particle:nth-child(6) { animation: orbit 3.3s linear 1.2s infinite reverse; --orbit-r: 26px; width: 2px; height: 2px; background: #fff; opacity: 0.45; }

  @keyframes orbit {
    to { transform: rotate(360deg) translateX(var(--orbit-r)); }
  }

  /* Constellation connecting line */
  .constellation-line {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 1;
    pointer-events: none;
  }
  .constellation-line polyline {
    fill: none;
    stroke: url(#lineGrad);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawLine 1s ease-out 1.2s forwards;
    opacity: 0.6;
  }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  /* ===== OPTION C: MOLTEN FORGE ===== */
  .stars-forge {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .star-wrap-c {
    position: relative;
    width: 44px;
    height: 44px;
    --slam-delay: calc(var(--idx) * 0.1s);
  }
  .star-wrap-c:nth-child(1) { --idx: 0; }
  .star-wrap-c:nth-child(2) { --idx: 1; }
  .star-wrap-c:nth-child(3) { --idx: 2; }
  .star-wrap-c:nth-child(4) { --idx: 3; }
  .star-wrap-c:nth-child(5) { --idx: 4; }

  .star-wrap-c svg {
    width: 44px;
    height: 44px;
    overflow: visible;
    animation: slamIn 0.5s cubic-bezier(0.22, 1.5, 0.36, 1) var(--slam-delay) both;
    filter: url(#noiseFilter);
  }
  @keyframes slamIn {
    0% { opacity: 0; transform: scale(2.5); }
    50% { opacity: 1; transform: scale(0.85); }
    70% { transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Rim glow cycling */
  .star-wrap-c::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    animation: rimGlow 2s ease-in-out calc(var(--idx) * 0.15s) infinite alternate;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes rimGlow {
    0% { box-shadow: 0 0 8px rgba(179,102,255,0.6), 0 0 20px rgba(179,102,255,0.3); }
    50% { box-shadow: 0 0 10px rgba(0,220,255,0.6), 0 0 24px rgba(0,220,255,0.3); }
    100% { box-shadow: 0 0 8px rgba(179,102,255,0.6), 0 0 20px rgba(179,102,255,0.3); }
  }

  /* Traveling shine across all stars - applied to parent */
  .forge-shine-track {
    position: absolute;
    inset: -10px;
    overflow: hidden;
    pointer-events: none;
    z-index: 10;
    clip-path: url(#forgeClipAll);
  }
  .forge-shine-track::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -30%;
    width: 40px;
    height: 200%;
    background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.05) 30%, rgba(255,255,255,0.45) 48%, rgba(255,255,255,0.55) 52%, rgba(255,255,255,0.05) 70%, transparent 100%);
    animation: forgeSweep 2.5s ease-in-out 0.8s infinite;
    transform: translateX(-40px) skewX(-15deg);
  }
  @keyframes forgeSweep {
    0% { transform: translateX(-60px) skewX(-15deg); }
    100% { transform: translateX(340px) skewX(-15deg); }
  }

  /* Noise shimmer */
  @keyframes noiseShift {
    0% { filter: url(#noiseFilter); }
    50% { filter: url(#noiseFilter2); }
    100% { filter: url(#noiseFilter); }
  }
  .star-wrap-c svg.shimmer-idle {
    animation: noiseShift 4s linear infinite;
  }
</style>
</head>
<body>

<h1>Star Rating Upgrade Options</h1>
<p class="subtitle">Cosmic Tier &mdash; 5-Star Game Over Screen</p>

<!-- Shared SVG Defs (hidden) -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- Gradient for Option A stars -->
    <linearGradient id="starGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8A0FF"/>
      <stop offset="50%" stop-color="#B366FF"/>
      <stop offset="100%" stop-color="#6B1FC0"/>
    </linearGradient>
    <!-- Gradient for Option B stars -->
    <linearGradient id="starGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8A0FF"/>
      <stop offset="45%" stop-color="#B366FF"/>
      <stop offset="100%" stop-color="#8B3FDF"/>
    </linearGradient>
    <!-- Radial gradient for Option C -->
    <radialGradient id="starGradC" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E8C0FF"/>
      <stop offset="40%" stop-color="#B366FF"/>
      <stop offset="100%" stop-color="#4A0E80"/>
    </radialGradient>
    <!-- Connecting line gradient for B -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B1FC0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#D8A0FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6B1FC0" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Clip path for star shape (used by Option A shine) -->
    <clipPath id="starClipA" clipPathUnits="objectBoundingBox">
      <path d="M0.5 0.083 L0.629 0.344 L0.917 0.386 L0.708 0.59 L0.758 0.917 L0.5 0.761 L0.243 0.917 L0.292 0.59 L0.083 0.386 L0.371 0.344 Z"/>
    </clipPath>
    <!-- Noise filters for Option C -->
    <filter id="noiseFilter" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="1" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <filter id="noiseFilter2" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="5" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Emboss-like inner shadow for C -->
    <filter id="embossFilter" x="-15%" y="-15%" width="130%" height="130%">
      <feMorphology operator="erode" radius="0.4" in="SourceAlpha" result="eroded"/>
      <feOffset dx="0.8" dy="0.8" in="eroded" result="offsetEroded"/>
      <feFlood flood-color="#1a0033" flood-opacity="0.5" result="darkColor"/>
      <feComposite in="darkColor" in2="offsetEroded" operator="in" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="innerShadow"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<div class="cards">
